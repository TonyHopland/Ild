name: Publish

# Build and push the two deployable images to GHCR. Called from ci.yml as a
# final, build-gated job on release tags so a failing build never publishes.
# Tagging/arch rules are recorded in docs/adr/0012-ghcr-image-tagging-strategy.md:
#   tag vX.Y.Z    -> tags X.Y.Z / X.Y / latest, amd64 + arm64
on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ild
            dockerfile: Dockerfile
            # Batteries-included, matching the compose defaults.
            extra_build_args: |
              WITH_OPENCODE=1
              WITH_PI=1
              WITH_CLAUDE_CODE=1
              WITH_NODE=1
              WITH_DOTNET_SDK=1
              WITH_CHROME=1
              WITH_CERTS=0
          - image: ild-workitem-server
            dockerfile: Dockerfile.WorkItemServer
            extra_build_args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: vars
        run: |
          version="$(.github/scripts/compute-version.sh \
            "$GITHUB_REF_TYPE" "$GITHUB_REF_NAME")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tonyhopland/${{ matrix.image }}
          # `latest` tracks the newest release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      # arm64 is built via QEMU emulation (slow, but releases are infrequent).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            ${{ matrix.extra_build_args }}
          # Scope the cache per image so the two matrix builds don't clobber
          # each other's gha cache entries.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
