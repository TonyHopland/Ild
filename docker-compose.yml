services:
  postgres:
    image: postgres:17-alpine
    container_name: ild-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  workitem-server:
    build:
      context: .
      dockerfile: Dockerfile.WorkItemServer
      args:
        DOTNET_VERSION: ${DOTNET_VERSION:-10.0}
    container_name: ild-workitem-server
    ports:
      - "8081:8081"
    environment:
      - WORKITEM_DATA_PATH=/data
      - WORKITEM_DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=IldWorkitems;Username=ild_workitems;Password=ild_workitems_password
      - "WORKITEM_API_KEYS=${WORKITEM_API_KEYS:?Set WORKITEM_API_KEYS in your .env (generate one with: openssl rand -hex 32)}"
      - ASPNETCORE_URLS=http://+:8081
    volumes:
      - workitem-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ild:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-24-alpine}
        DOTNET_VERSION: ${DOTNET_VERSION:-10.0}
        NODE_RUNTIME_VERSION: ${NODE_RUNTIME_VERSION:-24.15.0}
        DOTNET_SDK_CHANNEL: ${DOTNET_SDK_CHANNEL:-10.0}
        WITH_OPENCODE: ${WITH_OPENCODE:-1}
        WITH_PI: ${WITH_PI:-1}
        WITH_CLAUDE_CODE: ${WITH_CLAUDE_CODE:-1}
        WITH_NODE: ${WITH_NODE:-1}
        WITH_DOTNET_SDK: ${WITH_DOTNET_SDK:-1}
        WITH_CHROME: ${WITH_CHROME:-1}
        WITH_CERTS: ${WITH_CERTS:-0}
    container_name: ild
    ports:
      - "8080:8080"
      - "3100:3100"
      - "5100:5100"
    environment:
      - ILD_USERNAME=${ILD_USERNAME:-admin}
      - ILD_PASSWORD=${ILD_PASSWORD}
      - ILD_DATA_PATH=/data
      - ILD_WORKTREES_PATH=/worktrees
      - ILD_DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=IldCore;Username=ild_core;Password=ild_core_password
      - ILD_LOG_LEVEL=${ILD_LOG_LEVEL:-Information}
      - ILD_API_URL=${ILD_API_URL:-http://localhost:8080}
      - ILD_WORKITEM_SERVER_URL=${ILD_WORKITEM_SERVER_URL:-http://workitem-server:8081}
      - "ILD_WORKITEM_SERVER_API_KEY=${ILD_WORKITEM_SERVER_API_KEY:-${WORKITEM_API_KEYS:?Set WORKITEM_API_KEYS in your .env (generate one with: openssl rand -hex 32)}}"
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - ild-data:/data
      - ild-worktrees:/worktrees
      # One volume to persist all agent CLI config/login dirs (.claude,
      # .opencode, .pi, ...) across image rebuilds. The entrypoint
      # symlinks each name listed in AGENT_CONFIG_DIRS from $HOME into
      # this store, so binary installs in the image stay updatable.
      - ild-config:/home/ild/.agent-config
      - ${GIT_CONFIG:-~/.gitconfig}:/home/ild/.gitconfig:ro
    depends_on:
      postgres:
        condition: service_healthy
      workitem-server:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  ild-data:
  ild-worktrees:
  ild-config:
  workitem-data:
