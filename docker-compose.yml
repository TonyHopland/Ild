version: "3.9"

services:
  ild:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ild
    ports:
      - "8080:8080"
    environment:
      - ILD_USERNAME=${ILD_USERNAME:-admin}
      - ILD_PASSWORD=${ILD_PASSWORD:-changeme}
      - ILD_DATA_PATH=/data
      - ILD_WORKTREES_PATH=/worktrees
      - ILD_LOG_LEVEL=${ILD_LOG_LEVEL:-Information}
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - ild-data:/data
      - ild-worktrees:/worktrees
      - ${GIT_CONFIG:-~/.gitconfig}:/root/.gitconfig:ro
    restart: unless-stopped

volumes:
  ild-data:
  ild-worktrees:
